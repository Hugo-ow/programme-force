// Fonction utilitaire pour calculer les dates d'entrainement
const calculateTrainingDates = (startDate, trainingDays) => {
  if (!startDate || trainingDays.length !== 4) return null;
  
  const start = new Date(startDate);
  const sortedDays = [...trainingDays].sort((a, b) => a - b);
  const schedule = [];
  
  for (let week = 0; week < 9; week++) {
    const weekDates = [];
    for (let dayIndex = 0; dayIndex < 4; dayIndex++) {
      const targetDayOfWeek = sortedDays[dayIndex];
      const weekStart = new Date(start);
      weekStart.setDate(start.getDate() + (week * 7));
      
      // Trouver le jour correct de la semaine
      const currentDay = weekStart.getDay();
      const mondayOffset = currentDay === 0 ? -6 : 1 - currentDay;
      const monday = new Date(weekStart);
      monday.setDate(weekStart.getDate() + mondayOffset);
      
      const trainingDate = new Date(monday);
      trainingDate.setDate(monday.getDate() + targetDayOfWeek);
      
      weekDates.push(trainingDate);
    }
    schedule.push(weekDates);
  }
  
  return schedule;
};

// Fonctions de calcul du 1RM
const calculate1RM = (weight, reps) => {
  if (!weight || !reps || reps < 1) return 0;
  const w = parseFloat(weight);
  const r = parseInt(reps);
  
  if (r === 1) return w;
  if (r <= 6) {
    // Formule Epley pour 1-6 reps
    return Math.round(w * (1 + r / 30));
  } else {
    // Formule Brzycki pour 6-10 reps
    return Math.round(w * (36 / (37 - r)));
  }
};

// Composant Modal Calculateur de Plaques
function PlateCalculator({ weight, onClose }) {
  const barWeight = 20;
  const targetSideWeight = (parseFloat(weight || 0) - barWeight) / 2;

  const availablePlates = [
    { value: 25, color: "#dc2626" },
    { value: 20, color: "#2563eb" },
    { value: 15, color: "#ca8a04" },
    { value: 10, color: "#16a34a" },
    { value: 5, color: "#ffffff" },
    { value: 2.5, color: "#4b5563" },
    { value: 1.25, color: "#9ca3af" }
  ];

  let remaining = targetSideWeight;
  const computedPlates = {};

  if (remaining > 0) {
    availablePlates.forEach(plate => {
      const count = Math.floor(remaining / plate.value);
      if (count > 0) {
        computedPlates[plate.value] = count;
        remaining -= count * plate.value;
      }
    });
  }

  return (
    <div style={{
      position: "fixed", top: 0, left: 0, right: 0, bottom: 0,
      background: "rgba(0,0,0,0.8)", display: "flex", alignItems: "center",
      justifyContent: "center", zIndex: 100, padding: 16
    }}>
      <div style={{
        background: C.surface, borderRadius: 16, border: `1px solid ${C.border}`,
        width: "100%", maxWidth: 420, padding: 24, boxShadow: "0 10px 30px rgba(0,0,0,0.5)"
      }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 18 }}>
          <h3 style={{ margin: 0, fontSize: 18, fontWeight: 800 }}>Calculateur de plaques 🏋️</h3>
          <button onClick={onClose} style={{ background: "transparent", border: "none", color: C.textSec, fontSize: 18, cursor: "pointer" }}>✕</button>
        </div>

        <div style={{ textAlign: "center", padding: "16px 0", background: C.bgSec, borderRadius: 12, marginBottom: 20 }}>
          <div style={{ fontSize: 32, fontWeight: 900, color: C.accent }}>{weight || 20} <span style={{ fontSize: 16 }}>kg</span></div>
          <div style={{ fontSize: 12, color: C.textTer, marginTop: 4 }}>Barre standard de {barWeight} kg + {targetSideWeight > 0 ? (targetSideWeight * 2).toFixed(1) : 0} kg de disques</div>
        </div>

        <h4 style={{ fontSize: 13, color: C.textTer, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 12 }}>Plaques requises de CHAQUE côté :</h4>

        {targetSideWeight <= 0 ? (
          <div style={{ color: C.textSec, fontStyle: "italic", fontSize: 14, textAlign: "center", padding: "10px 0" }}>
            Uniquement la barre à vide !
          </div>
        ) : (
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            {availablePlates.map(plate => {
              const count = computedPlates[plate.value] || 0;
              return (
                <div key={plate.value} style={{
                  display: "flex", alignItems: "center", justifyContent: "space-between",
                  padding: "10px 14px", background: count > 0 ? `${plate.color}15` : "transparent",
                  borderRadius: 8, border: count > 0 ? `1px solid ${plate.color}44` : `1px solid ${C.divider}`
                }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                    <div style={{
                      width: 14, height: 14, borderRadius: "50%", background: plate.color,
                      border: "1px solid rgba(255,255,255,0.1)"
                    }} />
                    <span style={{ fontWeight: 700, fontSize: 15, color: count > 0 ? C.text : C.textSec }}>
                      {plate.value} kg
                    </span>
                  </div>
                  <span style={{
                    fontWeight: 800, fontSize: 16,
                    color: count > 0 ? C.accent : C.textTer,
                    background: count > 0 ? `${C.accent}22` : "transparent",
                    padding: "2px 8px", borderRadius: 4
                  }}>
                    × {count}
                  </span>
                </div>
              );
            })}
          </div>
        )}

        <button onClick={onClose} style={{
          width: "100%", padding: 12, borderRadius: 10, border: "none",
          background: C.accent, color: "#fff", cursor: "pointer", marginTop: 20,
          fontWeight: 700, fontSize: 14
        }}>Fermer</button>
      </div>
    </div>
  );
}

function App() {
  const [tab, setTab] = useState("program");
  const [week, setWeek] = useState(0);
  const [day, setDay] = useState(0);
  
  // Configuration du planning (date de debut + jours d'entrainement)
  const [planningConfig, setPlanningConfig] = useState(() => {
    if (typeof window === "undefined") return null;
    const saved = localStorage.getItem("forceux_planning");
    return saved ? JSON.parse(saved) : null;
  });
  const [showPlanningSetup, setShowPlanningSetup] = useState(false);
  
  // Calcul des dates d'entrainement
  const trainingSchedule = planningConfig 
    ? calculateTrainingDates(planningConfig.startDate, planningConfig.trainingDays) 
    : null;
  
  const [oneRMs, setOneRMs] = useState(() => {
    if (typeof window === "undefined") return { Squat: "", Bench: "", Deadlift: "" };
    const saved = localStorage.getItem("forceux_oneRMs");
    return saved ? JSON.parse(saved) : { Squat: "", Bench: "", Deadlift: "" };
  });
  
  const [program, setProgram] = useState(() => {
    if (typeof window === "undefined") return PROGRAM.map(w => w.map(d => ({ exercises: d.exercises.map(e => ({ ...e })) })));
    const saved = localStorage.getItem("forceux_program_v2");
    return saved ? JSON.parse(saved) : PROGRAM.map(w => w.map(d => ({ exercises: d.exercises.map(e => ({ ...e })) })));
  });

  const [log, setLog] = useState(() => {
    if (typeof window === "undefined") return defaultLog();
    const saved = localStorage.getItem("forceux_log");
    return saved ? JSON.parse(saved) : defaultLog();
  });

  const [logInputs, setLogInputs] = useState({});
  const [editMode, setEditMode] = useState(false);
  const [calcWeight, setCalcWeight] = useState(null); // Pour ouvrir le calculateur de plaques
  const [prAlert, setPrAlert] = useState(null);
  const [celebration, setCelebration] = useState(false);
  const [timerOpen, setTimerOpen] = useState(false);
  const [timerDuration, setTimerDuration] = useState(90);
  const [timerLeft, setTimerLeft] = useState(null); // null = pas démarré
  const [timerRunning, setTimerRunning] = useState(false);
  const timerRef = useRef(null);

  // ── Navigation "Aujourd'hui" ──────────────────────────────────────────────
  const goToToday = () => {
    if (!trainingSchedule) return;
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    for (let w = 0; w < trainingSchedule.length; w++) {
      for (let d = 0; d < trainingSchedule[w].length; d++) {
        const td = new Date(trainingSchedule[w][d]);
        td.setHours(0, 0, 0, 0);
        if (td.getTime() === today.getTime()) {
          setWeek(w);
          setDay(d);
          return;
        }
      }
    }
    // Pas de séance exacte aujourd'hui → aller à la prochaine séance future
    let nearest = null;
    for (let w = 0; w < trainingSchedule.length; w++) {
      for (let d = 0; d < trainingSchedule[w].length; d++) {
        const td = new Date(trainingSchedule[w][d]);
        td.setHours(0, 0, 0, 0);
        if (td > today) {
          if (!nearest || td < nearest.date) nearest = { w, d, date: td };
        }
      }
    }
    if (nearest) { setWeek(nearest.w); setDay(nearest.d); }
  };

  // Auto-navigation à l'ouverture si planning configuré
  const hasAutoNavigated = useRef(false);
  useEffect(() => {
    if (trainingSchedule && !hasAutoNavigated.current) {
      hasAutoNavigated.current = true;
      goToToday();
    }
  // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [trainingSchedule]);

  // ── Timer de repos ────────────────────────────────────────────────────────
  useEffect(() => {
    if (timerRunning && timerLeft > 0) {
      timerRef.current = setTimeout(() => setTimerLeft(t => t - 1), 1000);
    } else if (timerRunning && timerLeft === 0) {
      setTimerRunning(false);
      // Vibration si supportée
      if (navigator.vibrate) navigator.vibrate([300, 100, 300]);
    }
    return () => clearTimeout(timerRef.current);
  }, [timerRunning, timerLeft]);

  const startTimer = (duration?) => {
    const d = duration ?? timerDuration;
    setTimerDuration(d);
    setTimerLeft(d);
    setTimerRunning(true);
  };
  const pauseTimer = () => setTimerRunning(r => !r);
  const resetTimer = () => { setTimerRunning(false); setTimerLeft(null); };
  const timerPct = timerLeft !== null ? (timerLeft / timerDuration) * 100 : 100;
  const timerDone = timerLeft === 0;
  const fmtTime = (s) => `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
  const getLifetimePR = (exerciseName) => {
    let maxKg = 0;
    log.forEach(weekLog => {
      weekLog.forEach(dayLog => {
        dayLog.entries.forEach(entry => {
          entry.exercises.forEach(ex => {
            if (ex.name === exerciseName && ex.actualKg) {
              const kg = parseFloat(ex.actualKg);
              if (kg > maxKg) maxKg = kg;
            }
          });
        });
      });
    });
    return maxKg || null;
  };

  // Sauvegarde des 1RMs
  useEffect(() => {
    localStorage.setItem("forceux_oneRMs", JSON.stringify(oneRMs));
  }, [oneRMs]);

  // Sauvegarde du programme (lors d'un édit manuel ou d'un choix d'exercice)
  useEffect(() => {
    localStorage.setItem("forceux_program_v2", JSON.stringify(program));
  }, [program]);

  // Sauvegarde des logs
  useEffect(() => {
    localStorage.setItem("forceux_log", JSON.stringify(log));
  }, [log]);

  // Sauvegarde de la configuration du planning
  useEffect(() => {
    if (planningConfig) {
      localStorage.setItem("forceux_planning", JSON.stringify(planningConfig));
    }
  }, [planningConfig]);
  
  // Afficher le setup si pas de config
  useEffect(() => {
    if (!planningConfig) {
      setShowPlanningSetup(true);
    }
  }, [planningConfig]);

  const handleSavePlanning = (config) => {
    setPlanningConfig({ startDate: config.startDate, trainingDays: config.trainingDays });
    if (config.oneRMs) {
      setOneRMs(config.oneRMs);
    }
    setShowPlanningSetup(false);
  };

  const sess = program[week][day];
  const curLog = log[week][day];

  const calcKg = (pct, name) => {
    const n = name.toLowerCase();
    const key = n.includes("bench") || n.includes("couché") || n.includes("press") ? "Bench" : n.includes("dead") || n.includes("rdl") ? "Deadlift" : "Squat";
    const rm = parseFloat(oneRMs[key]);
    if (!rm || !pct) return null;
    return Math.round(rm * pct / 100 / 2.5) * 2.5;
  };
  
  // Fonction pour calculer le poids des back-off sets (-10%)
  const calcBackoffKg = (exIndex, currentLogInputs) => {
    const ex = sess.exercises[exIndex];
    if (!ex.name.includes("-10%")) return null;
    
    // Trouver le lift de base (Squat, Bench, Deadlift)
    const baseLift = ex.name.replace(" -10%", "").toLowerCase();
    
    // Chercher le top set correspondant (exercice precedent du meme type sans -10%)
    for (let i = exIndex - 1; i >= 0; i--) {
      const prevEx = sess.exercises[i];
      const prevName = prevEx.name.toLowerCase();
      
      // Verifier si c'est le meme type d'exercice sans le -10%
      if (prevName.includes(baseLift) && !prevName.includes("-10%")) {
        // Recuperer le poids saisi par l'utilisateur pour ce top set
        const topSetKg = currentLogInputs[`kg_${i}`];
        if (topSetKg && parseFloat(topSetKg) > 0) {
          // Calculer -10% et arrondir a 2.5kg
          return Math.round(parseFloat(topSetKg) * 0.9 / 2.5) * 2.5;
        }
        break;
      }
    }
    return null;
  };
  
  // Initialisation des inputs du Logger si vides
  useEffect(() => {
    const initialInputs = {};
    sess.exercises.forEach((ex, i) => {
      const kgTarget = calcKg(ex.pct, ex.name);
      initialInputs[`kg_${i}`] = kgTarget || "";
      initialInputs[`reps_${i}`] = ex.reps || "";
      initialInputs[`rpe_${i}`] = "";
    });
    setLogInputs(prev => ({ ...initialInputs, notes: prev.notes || "" }));
  }, [week, day, program]);
  
  // Mise a jour automatique des back-off sets quand le top set change
  useEffect(() => {
    const updatedInputs = { ...logInputs };
    let hasChanges = false;
    
    sess.exercises.forEach((ex, i) => {
      if (ex.name.includes("-10%")) {
        const backoffKg = calcBackoffKg(i, logInputs);
        if (backoffKg !== null && updatedInputs[`kg_${i}`] !== backoffKg.toString()) {
          updatedInputs[`kg_${i}`] = backoffKg.toString();
          hasChanges = true;
        }
      }
    });
    
    if (hasChanges) {
      setLogInputs(updatedInputs);
    }
  }, [logInputs, sess.exercises]);

  // ── Stats enrichies ───────────────────────────────────────────────────────
  const MAIN_LIFTS = ["Squat", "Bench", "Deadlift"];
  const liftKey = (name) => {
    const n = name.toLowerCase();
    if (n.includes("squat") || n.includes("hack") || n.includes("belt")) return "Squat";
    if (n.includes("bench") || n.includes("couché") || n.includes("chest press") || n.includes("press")) return "Bench";
    if (n.includes("dead") || n.includes("rdl")) return "Deadlift";
    return null;
  };

  // Max kg logué par lift et par semaine
  const statsPerWeek = Array.from({length:9}, (_, wi) => {
    const weekData = { week: wi + 1, Squat: null, Bench: null, Deadlift: null, volume: 0 };
    log[wi].forEach(dayLog => {
      dayLog.entries.forEach(entry => {
        entry.exercises.forEach(ex => {
          const kg = parseFloat(ex.actualKg);
          if (!kg) return;
          const lift = liftKey(ex.name);
          if (lift && (!weekData[lift] || kg > weekData[lift])) weekData[lift] = kg;
          const reps = parseInt(ex.actualReps) || parseInt(ex.reps) || 0;
          const sets = parseInt(ex.sets) || 0;
          weekData.volume += kg * reps * sets;
        });
      });
    });
    return weekData;
  }).filter(w => w.Squat || w.Bench || w.Deadlift || w.volume > 0);

  // PR all-time par lift
  const allTimePRs = MAIN_LIFTS.reduce((acc, lift) => {
    let max = 0;
    log.forEach(wl => wl.forEach(dl => dl.entries.forEach(entry =>
      entry.exercises.forEach(ex => {
        const kg = parseFloat(ex.actualKg);
        if (kg && liftKey(ex.name) === lift && kg > max) max = kg;
      })
    )));
    acc[lift] = max || null;
    return acc;
  }, {});

  // Streak de séances (semaines complètes consécutives)
  const seancesCompletees = log.flat().filter(d => d.entries.length > 0).length;
  const streakSemaines = (() => {
    let streak = 0;
    for (let wi = log.length - 1; wi >= 0; wi--) {
      if (log[wi].some(d => d.entries.length > 0)) streak++;
      else if (streak > 0) break;
    }
    return streak;
  })();

  // Mini SVG bar chart inline
  const BarChart = ({ data, liftColor }) => {
    if (!data.length) return null;
    const maxVal = Math.max(...data.flatMap(d => MAIN_LIFTS.map(l => d[l] || 0)));
    if (!maxVal) return null;
    const W = 300, H = 80, barW = Math.max(8, Math.floor((W - data.length * 2) / (data.length * 3 + 1)));
    const gap = 2;
    return (
      <svg width="100%" viewBox={`0 0 ${W} ${H + 20}`} style={{overflow:"visible"}}>
        {data.map((d, di) => (
          <g key={di}>
            {MAIN_LIFTS.map((lift, li) => {
              const val = d[lift] || 0;
              const bh = val ? Math.max(4, (val / maxVal) * H) : 0;
              const x = di * (barW * 3 + gap * 3 + 6) + li * (barW + gap);
              return (
                <g key={lift}>
                  <rect x={x} y={H - bh} width={barW} height={bh} rx={2}
                    fill={val ? liftColor[lift] : "transparent"}
                    opacity={val ? 0.85 : 0} />
                  {val > 0 && (
                    <text x={x + barW/2} y={H - bh - 3} textAnchor="middle"
                      style={{fontSize:8, fill: liftColor[lift], fontWeight:700}}>
                      {val}
                    </text>
                  )}
                </g>
              );
            })}
            <text x={di * (barW * 3 + gap * 3 + 6) + barW} y={H + 14}
              textAnchor="middle" style={{fontSize:9, fill: C.textTer}}>
              S{d.week}
            </text>
          </g>
        ))}
      </svg>
    );
  };

  const calcVolume = (entries) => {
    return entries.reduce((acc, ex) => {
      const kg = parseFloat(ex.actualKg || 0);
      const reps = parseInt(ex.actualReps) || parseInt(ex.reps) || 0;
      const sets = parseInt(ex.sets) || 0;
      return acc + (kg * reps * sets);
    }, 0);
  };

  const updEx = (i, field, val) => setProgram(prev => {
    const next = prev.map(w=>w.map(d=>({...d,exercises:[...d.exercises]})));
    next[week][day].exercises[i] = {...next[week][day].exercises[i],[field]:val};
    // S'assurer de mapper la vidéo démo correspondante si le nom change
    if (field === "name" && VIDEOS[val]) {
      next[week][day].exercises[i].videoUrl = VIDEOS[val];
    }
    return next;
  });

  const addEx = () => setProgram(prev => {
    const next = prev.map(w=>w.map(d=>({...d,exercises:[...d.exercises]})));
    next[week][day].exercises.push({name:"",sets:3,reps:5,pct:null,rpe:null,videoUrl:""});
    return next;
  });

  const rmEx = i => setProgram(prev => {
    const next = prev.map(w=>w.map(d=>({...d,exercises:[...d.exercises]})));
    next[week][day].exercises.splice(i,1);
    return next;
  });

  const saveLog = () => {
    const entries = sess.exercises.map((e,i)=>({
      name:e.name, sets:e.sets, reps:e.reps, targetPct:e.pct, targetRpe:e.rpe,
      actualKg:logInputs[`kg_${i}`]||"",
      actualReps:logInputs[`reps_${i}`]||e.reps,
      actualRpe:logInputs[`rpe_${i}`]||""
    }));

    // ── Détection des PRs ─────────────────────────────────────────────────
    const newPRs = [];
    entries.forEach(entry => {
      if (!entry.actualKg || entry.name === "Sélectionner") return;
      const newKg = parseFloat(entry.actualKg);
      if (!newKg) return;
      const prev = getLifetimePR(entry.name);
      if (!prev || newKg > prev) newPRs.push({ name: entry.name, kg: newKg, prev });
    });

    const date = new Date().toLocaleDateString("fr-FR");
    setLog(prev=>{
      const next=prev.map(w=>w.map(d=>({...d,entries:[...d.entries]})));
      next[week][day]={entries:[{date,exercises:entries,notes:logInputs.notes||""},...next[week][day].entries]};
      return next;
    });
    setLogInputs({});

    // ── Feedback post-save ────────────────────────────────────────────────
    setCelebration(true);
    setTimeout(() => setCelebration(false), 3500);

    if (newPRs.length > 0) {
      setPrAlert(newPRs);
    } else {
      setTab("history");
    }
  };

  const done = log.flat().filter(d=>d.entries.length>0).length;
  const prog = Math.round(done/36*100);
  const inp = {background:C.bgSec,border:`1px solid ${C.border}`,borderRadius:8,color:C.text,padding:"9px 12px",fontSize:14,outline:"none",boxSizing:"border-box",fontFamily:"inherit"};

  return (
    <div style={{background:C.bg,minHeight:"100vh",color:C.text,fontFamily:"'Inter',sans-serif",paddingBottom:48}}>

      {/* ── Modal PR ───────────────────────────────────────────────────── */}
      {prAlert && (
        <div style={{
          position:"fixed",top:0,left:0,right:0,bottom:0,
          background:"rgba(0,0,0,0.88)",display:"flex",alignItems:"center",
          justifyContent:"center",zIndex:500,padding:20
        }}>
          <div style={{
            background:C.surface,borderRadius:20,border:`2px solid ${C.accent}`,
            width:"100%",maxWidth:360,padding:28,textAlign:"center",
            boxShadow:`0 0 60px ${C.accent}44`
          }}>
            <div style={{fontSize:52,marginBottom:8}}>🏆</div>
            <div style={{fontSize:22,fontWeight:900,marginBottom:6,color:C.accent,letterSpacing:"-0.5px"}}>
              Nouveau record !
            </div>
            {prAlert.map((pr, i) => (
              <div key={i} style={{
                background:`${C.accent}14`,borderRadius:12,padding:"12px 16px",
                marginBottom:8,border:`1px solid ${C.accent}33`
              }}>
                <div style={{fontWeight:700,fontSize:15,marginBottom:4}}>{pr.name}</div>
                <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>
                  {pr.prev && (
                    <>
                      <span style={{fontSize:20,fontWeight:800,color:C.textSec}}>{pr.prev}kg</span>
                      <span style={{fontSize:16,color:C.textTer}}>→</span>
                    </>
                  )}
                  <span style={{fontSize:28,fontWeight:900,color:C.accent}}>{pr.kg}kg</span>
                  {pr.prev && (
                    <span style={{

                  </div>
                  <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
                    <span style={{fontSize:13,color:C.textTer}}>{ex.sets}×{ex.reps}</span>
                    {pc && <span style={{background:pc.bg,color:pc.text,borderRadius:20,padding:"2px 8px",fontSize:12,fontWeight:700}}>{ex.pct}% · {pc.label}</span>}
                    {rc && <span style={{background:rc.bg,color:rc.text,borderRadius:20,padding:"2px 8px",fontSize:12,fontWeight:700}}>RPE {ex.rpe} · {rc.label}</span>}
                    {kg && <span style={{background:`${C.accent}18`,color:C.accent,borderRadius:20,padding:"2px 8px",fontSize:12,fontWeight:700}}>Cible {kg}kg</span>}
                  </div>
                  <div style={{display:"flex",gap:10}}>
                    <div style={{flex:2}}>
                      <div style={{fontSize:11,color:C.textTer,marginBottom:4}}>Charge réelle (kg)</div>
                      <input type="number" placeholder={kg || "ex: 100"} value={logInputs[`kg_${i}`]||""}
                        onChange={e=>setLogInputs(p=>({...p,[`kg_${i}`]:e.target.value}))}
                        style={{...inp,width:"100%",fontSize:16,fontWeight:700}}/>
                    </div>
                    <div style={{flex:1.5}}>
                      <div style={{fontSize:11,color:C.textTer,marginBottom:4}}>Reps eff.</div>
                      <input type="text" placeholder={ex.reps || "8"} value={logInputs[`reps_${i}`]||""}
                        onChange={e=>setLogInputs(p=>({...p,[`reps_${i}`]:e.target.value}))}
                        style={{...inp,width:"100%",fontSize:16,fontWeight:700, textAlign:"center"}}/>
                    </div>
                    <div style={{flex:1.5}}>
                      <div style={{fontSize:11,color:C.textTer,marginBottom:4}}>RPE ressenti</div>
                      <input type="number" placeholder="ex: 8" step="0.5" min="1" max="10" value={logInputs[`rpe_${i}`]||""}
                        onChange={e=>setLogInputs(p=>({...p,[`rpe_${i}`]:e.target.value}))}
                        style={{...inp,width:"100%",fontSize:16,fontWeight:700}}/>
                    </div>
                  </div>
                </div>
              );
            })}
            <div style={{background:C.surface,borderRadius:14,padding:16,marginBottom:16,border:`1px solid ${C.border}`}}>
              <div style={{fontSize:11,color:C.textTer,marginBottom:6}}>Notes de séance</div>
              <textarea placeholder="Observations, blessures, forme du jour..." value={logInputs.notes||""}
                onChange={e=>setLogInputs(p=>({...p,notes:e.target.value}))}
                style={{...inp,width:"100%",resize:"vertical",minHeight:70}}/>
            </div>
            <button onClick={saveLog} style={{width:"100%",padding:16,borderRadius:14,border:"none",background:C.accent,color:"#fff",cursor:"pointer",fontSize:16,fontWeight:800,boxShadow:`0 4px 20px ${C.accent}55`}}>
              ✓ Sauvegarder la séance
            </button>
          </div>
        )}

        {/* ── HISTORIQUE ── */}
        {tab==="history" && (
          <div style={{marginTop:16}}>
            <div style={{fontWeight:800,fontSize:16,marginBottom:14}}>Historique — S{week+1} · Jour {day+1}</div>
            {curLog.entries.length===0 ? (
              <div style={{textAlign:"center",color:C.textTer,padding:"40px 0",fontSize:14}}>Aucune séance enregistrée pour ce jour.</div>
            ) : curLog.entries.map((entry,ei)=>(
              <div key={ei} style={{background:C.surface,borderRadius:14,padding:16,marginBottom:12,border:`1px solid ${C.border}`}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:12}}>
                  <div style={{fontWeight:700}}>Séance du {entry.date}</div>
                  <span style={{background:`${C.accent}18`,color:C.accent,borderRadius:20,padding:"2px 10px",fontSize:12,fontWeight:700}}>S{week+1} J{day+1}</span>
                </div>
                {entry.exercises.map((ex,xi)=>(
                  <div key={xi} style={{borderBottom:`1px solid ${C.divider}`,paddingBottom:10,marginBottom:10}}>
                    <div style={{fontWeight:600,marginBottom:4}}>{ex.name}</div>
                    <div style={{display:"flex",gap:10,flexWrap:"wrap",fontSize:13}}>
                      <span style={{color:C.textTer}}>Cible : {ex.sets}×{ex.reps}</span>
                      {ex.actualKg && <span style={{color:C.accent,fontWeight:700}}>⚖ {ex.actualKg}kg × {ex.actualReps || ex.reps} reps</span>}
                      {ex.actualRpe && (() => { const c=rpeColor(parseFloat(ex.actualRpe)); return c ? <span style={{color:c.text,fontWeight:700}}>RPE {ex.actualRpe}</span> : null; })()}
                      {ex.targetPct && <span style={{color:C.textTer}}>({ex.targetPct}% cible)</span>}
                    </div>
                  </div>
                ))}
                {entry.notes && <div style={{color:C.textSec,fontSize:13,fontStyle:"italic",marginTop:4}}>📝 {entry.notes}</div>}
              </div>
            ))}
          </div>
        )}

        {/* ── STATISTIQUES ── */}
        {tab==="stats" && (
          <div style={{marginTop:16}}>

            {/* KPIs du haut */}
            <div style={{display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:8, marginBottom:16}}>
              <div style={{background:C.surface, borderRadius:12, padding:"12px 14px", border:`1px solid ${C.border}`, textAlign:"center"}}>
                <div style={{fontSize:11, color:C.textTer, marginBottom:4, textTransform:"uppercase", letterSpacing:0.5}}>Séances</div>
                <div style={{fontSize:26, fontWeight:900, color:C.accent}}>{seancesCompletees}</div>
                <div style={{fontSize:10, color:C.textTer}}>sur 36</div>
              </div>
              <div style={{background:C.surface, borderRadius:12, padding:"12px 14px", border:`1px solid ${C.border}`, textAlign:"center"}}>
                <div style={{fontSize:11, color:C.textTer, marginBottom:4, textTransform:"uppercase", letterSpacing:0.5}}>Streak</div>
                <div style={{fontSize:26, fontWeight:900, color:"#facc15"}}>{streakSemaines}</div>
                <div style={{fontSize:10, color:C.textTer}}>semaines</div>
              </div>
              <div style={{background:C.surface, borderRadius:12, padding:"12px 14px", border:`1px solid ${C.border}`, textAlign:"center"}}>
                <div style={{fontSize:11, color:C.textTer, marginBottom:4, textTransform:"uppercase", letterSpacing:0.5}}>Progression</div>
                <div style={{fontSize:26, fontWeight:900, color:"#4ade80"}}>{Math.round(seancesCompletees/36*100)}%</div>
                <div style={{fontSize:10, color:C.textTer}}>du programme</div>
              </div>
            </div>

            {/* Records personnels */}
            <div style={{background:C.surface, borderRadius:14, padding:16, border:`1px solid ${C.border}`, marginBottom:14}}>
              <div style={{fontWeight:800, fontSize:14, marginBottom:12, display:"flex", alignItems:"center", gap:8}}>
                🏆 Records personnels
              </div>
              <div style={{display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:8}}>
                {MAIN_LIFTS.map(lift => (
                  <div key={lift} style={{
                    background: allTimePRs[lift] ? `${C.accent}14` : C.bg,
                    borderRadius:10, padding:"10px 12px", border:`1px solid ${allTimePRs[lift] ? `${C.accent}33` : C.border}`,
                    textAlign:"center"
                  }}>
                    <div style={{fontSize:11, color:C.textTer, marginBottom:4}}>{lift}</div>
                    <div style={{fontSize:22, fontWeight:900, color: allTimePRs[lift] ? C.accent : C.textTer}}>
                      {allTimePRs[lift] ? `${allTimePRs[lift]}kg` : "—"}
                    </div>
                  </div>
                ))}
              </div>
            </div>

            {/* Graphique progression des charges */}
            {statsPerWeek.length > 0 ? (
              <div style={{background:C.surface, borderRadius:14, padding:16, border:`1px solid ${C.border}`, marginBottom:14}}>
                <div style={{fontWeight:800, fontSize:14, marginBottom:4}}>📈 Progression par mouvement</div>
                <div style={{fontSize:11, color:C.textTer, marginBottom:14}}>Charge max loggée par semaine (kg)</div>
                {/* Légende */}
                <div style={{display:"flex", gap:14, marginBottom:12}}>
                  {[["Squat","#60a5fa"],["Bench","#f472b6"],["Deadlift","#34d399"]].map(([l,c])=>(
                    <div key={l} style={{display:"flex",alignItems:"center",gap:5}}>
                      <div style={{width:10,height:10,borderRadius:2,background:c}}/>
                      <span style={{fontSize:11,color:C.textSec}}>{l}</span>
                    </div>
                  ))}
                </div>
                <BarChart data={statsPerWeek} liftColor={{Squat:"#60a5fa",Bench:"#f472b6",Deadlift:"#34d399"}} />
              </div>
            ) : null}

            {/* Tonnage par séance */}
            <div style={{background:C.surface, borderRadius:14, padding:16, border:`1px solid ${C.border}`}}>
              <div style={{fontWeight:800, fontSize:14, marginBottom:12}}>🏋️ Volume par séance (tonnage)</div>
              {statsPerWeek.length > 0 ? (
                <div style={{display:"flex", flexDirection:"column", gap:8}}>
                  {log.flat().filter(d=>d.entries.length>0).map((d, i) => {
                    const vol = calcVolume(d.entries[0].exercises);
                    const maxVol = Math.max(...log.flat().filter(x=>x.entries.length>0).map(x=>calcVolume(x.entries[0].exercises)));
                    const pct = maxVol ? (vol/maxVol)*100 : 0;
                    return (
                      <div key={i}>
                        <div style={{display:"flex", justifyContent:"space-between", marginBottom:4}}>
                          <span style={{fontSize:12, color:C.textSec}}>Séance du {d.entries[0].date}</span>
                          <span style={{fontSize:12, fontWeight:800, color:C.accent}}>{vol.toLocaleString("fr-FR")} kg</span>
                        </div>
                        <div style={{height:4, background:C.bg, borderRadius:2, overflow:"hidden"}}>
                          <div style={{height:"100%", width:`${pct}%`, background:C.accent, borderRadius:2, opacity:0.7}}/>
                        </div>
                      </div>
                    );
                  })}
                </div>
              ) : (
                <div style={{textAlign:"center",color:C.textTer,padding:"24px 0",fontSize:14}}>
                  <div style={{fontSize:24, marginBottom:8}}>📊</div>
                  Aucune séance enregistrée.<br/>Remplis tes charges pour voir les stats.
                </div>
              )}
            </div>
          </div>
        )}

      </div>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
